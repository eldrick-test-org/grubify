name: Trigger SRE Agent

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened

jobs:
  notify-sre-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SRE Agent
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://sre-agent-uqeqqjkb7aezo--750131e9.6665b3be.eastus2.azuresre.ai/api/v1/httptriggers/trigger/920f5607-6e41-4dab-ab15-9403ce9c14fc" \
            -H "Content-Type: application/json" \
            -d '{
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "event": "${{ github.event_name }}",
              "issue_number": "${{ github.event.issue.number }}",
              "issue_title": "${{ github.event.issue.title }}",
              "message": "${{ github.event.head_commit.message }}"
            }'
